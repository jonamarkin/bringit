<!doctype html>
<html>
  <body style="font-family: Inter, Arial, sans-serif; background:#f0f0f0; padding:24px; color:#111113;">
    <div style="max-width:560px; margin:0 auto; background:#fff; border:1px solid #e6e6e8; border-radius:20px; padding:28px;">
      <p style="font-size:12px; text-transform:uppercase; letter-spacing:.08em; color:#8f8f95; margin:0 0 12px;">{{ .EventTitle }}</p>
      <h1 style="font-size:24px; margin:0 0 12px;">{{ .Title }}</h1>
      <p style="font-size:15px; color:#4c4c52; line-height:1.55;">{{ .Message }}</p>
      <a href="{{ .DashboardURL }}" style="display:inline-block; background:#09090b; color:#fff; text-decoration:none; border-radius:12px; padding:12px 18px; font-weight:700; margin-top:18px;">Open dashboard</a>
    </div>
  </body>
</html>
