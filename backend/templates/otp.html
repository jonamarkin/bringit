<!doctype html>
<html>
  <body style="font-family: Inter, Arial, sans-serif; background:#f0f0f0; padding:24px; color:#111113;">
    <div style="max-width:520px; margin:0 auto; background:#fff; border:1px solid #e6e6e8; border-radius:20px; padding:28px;">
      <p style="font-size:12px; text-transform:uppercase; letter-spacing:.08em; color:#8f8f95; margin:0 0 12px;">BringIt login</p>
      <h1 style="font-size:26px; margin:0 0 12px;">Your sign-in code</h1>
      <p style="font-size:15px; color:#4c4c52; line-height:1.5;">Use this code to continue creating or managing your event.</p>
      <div style="font-size:32px; font-weight:800; letter-spacing:.18em; background:#f7f7f8; border:1px solid #e6e6e8; border-radius:14px; padding:16px 18px; margin:22px 0;">
        {{ .Code }}
      </div>
      <p style="font-size:13px; color:#8f8f95;">This code expires in 10 minutes.</p>
    </div>
  </body>
</html>
