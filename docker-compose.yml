services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bringit}
      POSTGRES_USER: ${POSTGRES_USER:-bringit}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bringit}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${DB_PORT:-55432}:5432"
    volumes:
      - bringit-db:/var/lib/postgresql/data

  api:
    build:
      context: ./backend
    environment:
      APP_ENV: ${APP_ENV:-development}
      DATABASE_URL: ${DATABASE_URL:-postgres://bringit:bringit@db:5432/bringit?sslmode=disable}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:3000}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:3000}
      HTTP_ADDR: :8080
      JWT_SECRET: ${JWT_SECRET:-dev-only-change-this-bringit-secret}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_SENDER: ${SMTP_SENDER:-}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
    environment:
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-http://localhost:8080}
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  bringit-db:
